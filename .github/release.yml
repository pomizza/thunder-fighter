# GitHub Release 配置
# 文档: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

# === Release Notes 配置 ===
# 当创建新 tag 时自动生成 Release Notes

changelog:
  # 排除这些作者（自动化 PR 不算贡献者）
  exclude:
    authors:
      - dependabot[bot]
      - github-actions[bot]
    labels:
      - "ignore-for-release"
      - "duplicate"
      - "invalid"
      - "wontfix"
    # 排除这些提交类型
    commits:
      # 私有提交不计入
      # (本项目所有 commit 都计入)

  # 重新分类规则
  # 将带某些 label 的 PR 重新归类
  categories:
    - title: "🚀 新功能 (Features)"
      labels:
        - "feature"
        - "enhancement"
        - "feat"
        - "new"
    - title: "🐛 Bug 修复 (Bug Fixes)"
      labels:
        - "bug"
        - "fix"
        - "bugfix"
        - "regression"
    - title: "📚 文档 (Documentation)"
      labels:
        - "documentation"
        - "docs"
        - "readme"
    - title: "🎨 视觉/UI (UI/UX)"
      labels:
        - "ui"
        - "ux"
        - "design"
        - "visual"
    - title: "⚡ 性能 (Performance)"
      labels:
        - "performance"
        - "perf"
        - "optimization"
    - title: "🔧 重构 (Refactoring)"
      labels:
        - "refactor"
        - "refactoring"
        - "cleanup"
    - title: "🧪 测试 (Tests)"
      labels:
        - "test"
        - "tests"
        - "testing"
    - title: "📦 构建/CI (Build/CI)"
      labels:
        - "build"
        - "ci"
        - "workflow"
    - title: "📝 其他 (Other)"
      # 无 label 的 commit 归这里

  # 限制只显示最近的 N 个版本
  # version: "v1.0.0"  # 取消注释可只对特定版本生效
  max-issues-to-parse: 100  # 解析最近 100 个 issue
  max-pull-requests-to-parse: 100  # 解析最近 100 个 PR
  # exclude-authors 不是此处的标准字段（见下）
  ignore-contributors-by-labels:  # 这是个常见的错误字段名，正确是 ignore-contributors
    - "ignore-for-release"

# === 默认行为 ===
# 未来用户创建 tag 时，可手动选择"Generate release notes"按钮
# 启用此配置后，自动从 PR/commits 生成

# === 推荐流程 ===
# 1. 用户在 GitHub 上创建 PR（带 label）
# 2. PR 合并后 commit 出现在 main
# 3. 用户打 tag: git tag -a v1.1.0 -m "..."
# 4. 推送 tag: git push origin v1.1.0
# 5. GitHub 自动:
#    - 创建 GitHub Release
#    - 用 changelog.categories 分类 commits
#    - 添加完整 changelog 文本

# === 本项目的 release label 推荐 ===
# 提交 PR 时建议加以下 label:
#   feat: 新功能
#   bug: Bug 修复
#   docs: 仅文档
#   perf: 性能
#   refactor: 重构
#   test: 测试
#   build: 构建/CI

