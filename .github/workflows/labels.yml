# labels workflow
# 【重要】使用 crazy-max/ghaction-github-labeler@v5（不升级 v6）
# 原因：v1.0.0 CI 稳定，避免被自动升级破坏
# v1.1.0 时手动升级到 v6

name: Sync Labels
on:
  push:
    branches: [master, main]
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
