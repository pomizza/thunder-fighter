name: Tests

# 在 push 和 PR 时触发
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# 允许手动触发（Actions 页面）
  workflow_dispatch:

jobs:
  test:
    name: 运行测试套件
    runs-on: ubuntu-latest

    # Node.js 版本矩阵
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
      fail-fast: false

    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: 设置 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # 0 依赖项目无需 cache

      # 3. 验证项目结构
      - name: 验证项目结构
        run: |
          echo "=== 项目文件 ==="
          ls -la
          echo ""
          echo "=== JS 模块数 ==="
          ls js/*.js | wc -l
          echo "=== 测试文件数 ==="
          ls tests/test-*.cjs | wc -l

      # 4. 跑测试
      - name: 跑测试
        run: npm test

      # 5. 测试覆盖率（可选）
      - name: 测试覆盖率（自统计）
        if: matrix.node-version == '20.x'
        run: |
          echo "=== 模块行数 ==="
          wc -l js/*.js | tail -1
          echo "=== 测试行数 ==="
          wc -l tests/*.cjs | tail -1
          echo "=== 总计 ==="
          find . -type f \( -name "*.js" -o -name "*.cjs" -o -name "*.html" \) -not -path "./.git/*" | xargs wc -l | tail -1
