<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#02020a"/>
  <!-- 星云光晕 -->
  <circle cx="50" cy="50" r="40" fill="url(#glow)" opacity="0.3"/>
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#508cff"/>
      <stop offset="100%" stop-color="#7850ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 战机主体（蓝隼造型）-->
  <!-- 机翼 -->
  <polygon points="20,55 50,40 50,60" fill="#1166cc" stroke="#4488ff" stroke-width="1"/>
  <polygon points="80,55 50,40 50,60" fill="#1166cc" stroke="#4488ff" stroke-width="1"/>
  <!-- 机身 -->
  <polygon points="50,30 55,55 50,70 45,55" fill="#2266dd" stroke="#66aaff" stroke-width="1.5"/>
  <!-- 驾驶舱 -->
  <ellipse cx="50" cy="50" rx="4" ry="6" fill="#aaffff"/>
  <!-- 引擎尾焰 -->
  <polygon points="46,70 54,70 52,80 48,80" fill="#ffaa33" opacity="0.8"/>
  <polygon points="47,80 53,80 51,88 49,88" fill="#ff5522" opacity="0.6"/>
</svg>
