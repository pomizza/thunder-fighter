<script>
  // 暴露 perf 全局供 game.js 使用
  if (typeof PerfMonitor !== 'undefined') {
    window.perf = new PerfMonitor();
    // F3 切换 FPS 显示
    document.addEventListener('keydown', e => {
      if (e.key === 'F3') {
        e.preventDefault();
        window.perf.toggle();
      }
    });
  }
</script>

<!--
  雷霆战机 · Thunder Fighter
  ================================
  纯 HTML5 + JavaScript + Canvas 实现
  0 外部依赖 · 17 个 JS 模块 · 3906 行代码
  GitHub: https://github.com/...

  模块加载顺序（按依赖关系）：
  ─────────────────────────────────────
  【基础层】无依赖的原子工具
    1. audio.js       - WebAudio 程序化音效
    2. utils.js       - 数学/碰撞/输入助手
    3. config.js      - 时序/玩家/触屏常量集中管理

  【效果层】视觉效果与基础对象
    4. effects.js     - 粒子/拖尾/震动/星云/流星
    5. bullets.js     - 子弹类
    6. performance.js - FPS 计数器 + 性能基准（按 F3 切换显示）

  【实体层】游戏对象
    7. enemies.js     - 敌机/Boss/道具（3 个 class）
    8. player.js      - 玩家战机

  【数据层】静态配置和系统
    9. levels.js      - 5 关脚本+波次执行
    10. difficulty.js  - 3 难度系统

  【系统层】可选/UI 系统
    11. touch.js        - 触屏虚拟摇杆
    12. shop.js         - 关卡间商店
    13. shipSelect.js   - 战机选择
    14. achievements.js - 10 成就+通知
    15. replay.js       - 录像/回放

  【核心层】游戏主类（最后加载）
    16. gameInput.js    - 键盘事件路由（game.js 拆分）
    17. gameLogic.js    - update 游戏逻辑（game.js 拆分）
    18. game.js         - 主循环+状态机

  添加新模块：
  - 若模块被 game.js 引用，加在 gameLogic.js 后、game.js 前
  - 若模块独立系统，可加在 achievements.js 后、gameInput.js 前
  - 同步更新 tests/runner.cjs 的 order[] 数组
-->
